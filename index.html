<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Metadata -->
    <title>umbrela | Technology Holding Organisation</title>
    <meta name="description" content="umbrela is a technology holding organisation. Our ventures are in development — built deliberately, launched when ready.">
    <meta property="og:title" content="umbrela | Taking Shape">
    <meta property="og:description" content="umbrela is a technology holding organisation. Our ventures are in development.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.umbrela.in/">
    
    <!-- Google Fonts: Inter for a clean, tech-forward look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #EDEDED;
            --text-secondary: #888888;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 4rem 2rem;
            line-height: 1.6;
        }

        header {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--text-secondary);
        }

        header a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
        }

        main {
            max-width: 600px;
            margin-top: -10vh; /* Optical centering */
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        h1 em {
            font-style: italic;
            color: var(--text-secondary);
        }

        p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 1rem;
        }

        .status-badge {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid #333;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        footer {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--text-primary);
        }

        /* Subtle fade-in animation */
        body {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <a href="/">umbrela</a> &mdash; Parent Organisation
    </header>

    <main>
        <h1>Something is <em>taking shape.</em></h1>
        <p><strong>umbrela</strong> is a technology holding organisation.</p>
        <p>Our ventures are in development — built deliberately, launched when ready.</p>
        
        <div class="status-badge">
            <span style="display:inline-block; width:6px; height:6px; background:#fff; border-radius:50%; margin-right:6px; margin-bottom:1px;"></span>
            Forming — no public announcements yet
        </div>
    </main>

    <footer>
        <div>For inquiries: <a href="mailto:hello@umbrela.in">hello@umbrela.in</a></div>
        <div>&copy; 2025 umbrela Technology & Software</div>
    </footer>

</body>
</html>

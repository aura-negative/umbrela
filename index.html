<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>umbrela | The world is not solved yet.</title>
    <meta name="description" content="umbrela is a technology holding organisation. Our ventures are in development — built deliberately, launched when ready.">
    
    <!-- Premium Google Fonts: Newsreader (Editorial Serif) & DM Sans (Technical Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Newsreader:opsz,wght@6..72,300;6..72,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --text-primary: #F4F4F5;
            --text-secondary: #8A8A93;
            --text-muted: #55555A;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            /* Base font is the technical sans-serif */
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 3rem 2rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Layout Grid */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Top Navigation / Brand */
        header {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        header span {
            color: var(--text-primary);
        }

        /* Main Content Alignment */
        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 700px;
            margin-top: -5vh; /* Optical centering */
        }

        /* The Hero Typography */
        h1 {
            /* The Editorial Serif */
            font-family: 'Newsreader', serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 300;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin: 0 0 2.5rem 0;
            color: var(--text-primary);
        }

        /* Adding a subtle italic emphasis to draw the eye */
        h1 em {
            font-style: italic;
            color: #b5b5b5;
        }

        /* Body Typography */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        p {
            font-size: clamp(1.1rem, 2vw, 1.35rem);
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.6;
            margin: 0;
            max-width: 550px;
        }

        p strong {
            color: var(--text-primary);
            font-weight: 400;
        }

        /* Technical / Status Details */
        .meta-details {
            margin-top: 3rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .pulsing-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-primary);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        /* Footer */
        footer {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--text-primary);
        }

        /* Subtle Animations */
        body {
            animation: fadeIn 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <span>umbrela</span> // Technology Holding
        </header>

        <main>
            <!-- The new philosophical hook -->
            <h1>The world is <br>not <em>solved</em> yet.</h1>
            
            <div class="content-wrapper">
                <p>Something is taking shape.</p>
                <p><strong>umbrela</strong> is a technology holding organisation. Our ventures are currently in development — built deliberately, and launched only when ready.</p>
            </div>
            
            <div class="meta-details">
                <span class="pulsing-dot"></span>
                Forming — No public announcements yet
            </div>
        </main>

        <footer>
            <div>&copy; 2026 umbrela</div>
            <div><a href="mailto:hello@umbrela.in">hello@umbrela.in</a></div>
        </footer>
    </div>

</body>
</html>

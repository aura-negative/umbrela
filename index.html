<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>umbrela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F5F4F0;
      --ink: #111110;
      --ink-soft: #6B6A65;
      --accent: #111110;
      --line: rgba(17, 17, 16, 0.12);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* ── Header ── */
    header {
      padding: 2.5rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.1s;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 4rem 3rem;
    }

    .center {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    /* Large logo mark */
    .logo-mark {
      display: inline-block;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.3s;
    }

    .logo-mark svg {
      width: 64px;
      height: 64px;
    }

    /* Horizontal rule */
    .rule {
      width: 40px;
      height: 1px;
      background: var(--ink);
      margin: 0 auto 3rem;
      opacity: 0;
      animation: scaleIn 0.6s ease forwards;
      animation-delay: 0.5s;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.55s;
    }

    .headline em {
      font-style: italic;
      color: var(--ink-soft);
    }

    .descriptor {
      font-size: 0.78rem;
      line-height: 1.9;
      letter-spacing: 0.03em;
      color: var(--ink-soft);
      max-width: 380px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.75s;
    }

    /* ── Divider dots ── */
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 3rem 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.9s;
    }

    .dots span {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ink-soft);
      opacity: 0.4;
    }

    .status-line {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1s;
    }

    .status-line span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-soft);
      margin-right: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
      animation: pulse 2.4s ease-in-out infinite;
    }

    /* ── Footer ── */
    footer {
      padding: 2rem 3rem;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1.1s;
    }

    .footer-left {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .footer-right {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 18px;
      height: 18px;
      opacity: 0.18;
    }
    .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--ink); border-left: 1px solid var(--ink); }
    .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--ink); border-right: 1px solid var(--ink); }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--ink); border-left: 1px solid var(--ink); }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--ink); border-right: 1px solid var(--ink); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%       { opacity: 0.9;  transform: scale(1.3); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header, footer { padding: 1.75rem 1.5rem; }
      main { padding: 3rem 1.5rem; }
      .footer-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- Corner marks -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <header>
    <a class="wordmark" href="/">umbrela</a>
    <span class="tag">Parent Organisation</span>
  </header>

  <main>
    <div class="center">

      <!-- Umbrella icon mark -->
      <div class="logo-mark">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Canopy arc -->
          <path d="M8 32 C8 16.536 18.745 4 32 4 C45.255 4 56 16.536 56 32 Z"
                stroke="#111110" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
          <!-- Center rib -->
          <line x1="32" y1="4" x2="32" y2="32" stroke="#111110" stroke-width="1.4"/>
          <!-- Left ribs -->
          <line x1="32" y1="18" x2="8" y2="32" stroke="#111110" stroke-width="0.8" stroke-dasharray="2 2"/>
          <line x1="32" y1="12" x2="20" y2="32" stroke="#111110" stroke-width="0.8" stroke-dasharray="2 2"/>
          <!-- Right ribs -->
          <line x1="32" y1="18" x2="56" y2="32" stroke="#111110" stroke-width="0.8" stroke-dasharray="2 2"/>
          <line x1="32" y1="12" x2="44" y2="32" stroke="#111110" stroke-width="0.8" stroke-dasharray="2 2"/>
          <!-- Handle -->
          <path d="M32 32 L32 54 Q32 60 26 60 Q20 60 20 54"
                stroke="#111110" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="rule"></div>

      <h1 class="headline">
        Something is<br/><em>taking shape.</em>
      </h1>

      <p class="descriptor">
        umbrela is a technology holding organisation.<br/>
        Our ventures are in development — built deliberately,<br/>launched when ready.
      </p>

      <div class="dots">
        <span></span><span></span><span></span>
      </div>

      <p class="status-line">
        <span></span>Forming — no public announcements yet
      </p>

    </div>
  </main>

  <footer>
    <span class="footer-left">&copy; 2025 umbrela</span>
    <span class="footer-right">Technology &amp; Software</span>
  </footer>

</body>
</html>
